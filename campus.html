<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus de Gestión Gastronómica</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="theory_data.js"></script>
  <script src="questions_data.js"></script>
  <script src="campus_quiz.js"></script>
  <style>
    :root {
      --bg: #0d0f0c;
      --surface: #13160f;
      --card: #181c14;
      --card2: #1c2018;
      --border: #2a3023;
      --gold: #d4a853;
      --gold-low: rgba(212, 168, 83, 0.1);
      --green: #7bc67a;
      --red: #e05a5a;
      --blue: #6ab4d4;
      --text: #e8ead4;
      --muted: #7a8470;
      --mono: 'IBM Plex Mono', monospace;
      --body: 'DM Sans', sans-serif;
      --display: 'Fraunces', serif;
      --sidebar-w: 280px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 100;
    }

    .sidebar-header {
      padding: 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--display);
      font-size: 20px;
      color: var(--gold);
    }

    .main-nav { padding: 24px 16px; border-bottom: 1px solid var(--border); }
    .nav-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .nav-btn:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-btn.active { background: var(--gold-low); color: var(--gold); }
    
    .module-list { padding: 16px; overflow-y: auto; flex: 1; }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      border-radius: 6px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 2px;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--gold); background: rgba(212,168,83,0.05); }
    .nav-icon { margin-right: 10px; }

    /* --- MAIN --- */
    .main-content { flex: 1; overflow-y: auto; padding: 40px; }
    .content-header { margin-bottom: 40px; }
    .tag { font-family: var(--mono); font-size: 10px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
    .title { font-family: var(--display); font-size: 36px; margin-top: 8px; }

    .tabs { display: flex; gap: 24px; margin-top: 32px; border-bottom: 1px solid var(--border); }
    .tab {
      padding: 12px 0; background: none; border: none; color: var(--muted);
      font-family: var(--mono); font-size: 11px; letter-spacing: 1px; cursor: pointer;
      position: relative;
    }
    .tab.active { color: var(--gold); }
    .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--gold); }

    .theory-card { background: var(--card2); padding: 32px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
    .practice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .calc-card { background: var(--card); border: 1px solid var(--border); padding: 32px; border-radius: 12px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
    .input-group input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 4px; outline: none; }
    .res-card { background: var(--gold-low); border: 1px solid rgba(212,168,83,0.2); padding: 20px; border-radius: 8px; margin-bottom: 12px; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .main-view { animation: fadeIn 0.4s ease forwards; }

    @media (max-width: 900px) {
      .sidebar { position: fixed; left: -280px; }
      .practice-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body onload="init()">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1 class="logo">Campus de Gestión Gastronómica</h1>
      <p style="font-size: 10px; color: var(--muted); font-family: var(--mono); margin-top: 4px;">SISTEMA DE GESTIÓN</p>
    </div>

    <div class="main-nav">
      <div class="nav-btn active" onclick="switchMainView('campus')" id="btn-campus">
        <span class="nav-icon">📚</span>
        <span class="nav-label">Campus</span>
      </div>
      <div class="nav-btn" onclick="switchMainView('exams')" id="btn-exams">
        <span class="nav-icon">📝</span>
        <span class="nav-label">Exámenes</span>
      </div>
      <div class="nav-btn" onclick="switchMainView('dashboard')" id="btn-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Panel</span>
      </div>
    </div>

    <div id="moduleNavContainer" class="module-list">
      <p style="font-size: 9px; color: var(--muted); font-family: var(--mono); margin-bottom: 12px; text-transform: uppercase;">Módulos</p>
      <nav id="moduleNav"></nav>
    </div>
  </aside>

  <main class="main-content">
    <!-- VISTA CAMPUS -->
    <div id="view-campus" class="main-view">
      <header class="content-header">
        <span class="tag" id="currentModTag">Módulo 01</span>
        <h2 class="title" id="currentModTitle">Cargando...</h2>
        <div class="tabs">
          <button class="tab active" onclick="setTab('theory', this)">Teoría</button>
          <button class="tab" onclick="setTab('practice', this)">Práctica</button>
          <button class="tab" onclick="setTab('exercises', this)">Ejercicios</button>
        </div>
      </header>
      <div id="moduleView"></div>
    </div>

    <!-- VISTA EXÁMENES -->
    <div id="view-exams" class="main-view" style="display: none;">
      <header class="content-header">
        <span class="tag">Evaluación</span>
        <h2 class="title">Exámenes Finales</h2>
      </header>
      <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;">
        <div class="calc-card" onclick="window.open('simulacro1.html')" style="cursor: pointer;">
          <h3 style="color: var(--gold);">Simulacro 01</h3>
          <p style="color: var(--muted); font-size: 13px; margin-top: 10px;">Clasificación y Comportamiento.</p>
        </div>
        <div class="calc-card" onclick="window.open('simulacro2.html')" style="cursor: pointer;">
          <h3 style="color: var(--gold);">Simulacro 02</h3>
          <p style="color: var(--muted); font-size: 13px; margin-top: 10px;">PE y Rentabilidad.</p>
        </div>
      </div>
    </div>

    <!-- VISTA DASHBOARD -->
    <div id="view-dashboard" class="main-view" style="display: none;">
      <header class="content-header">
        <span class="tag">Analytics</span>
        <h2 class="title">Panel de Alumnos</h2>
      </header>
      <iframe src="dashboard.html" style="width: 100%; height: 75vh; border: none; border-radius: 12px;"></iframe>
    </div>
  </main>

  <script>
    const SUPABASE_URL = 'https://dukgjrhyhyxvdqzhthje.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR1a2dqcmh5aHl4dmRxemh0aGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5MTQzNjIsImV4cCI6MjA4MzQ5MDM2Mn0.JYZWv2vYwMbTopyL-T8_kjbX2py5IL7Ap6ASZc2B4dM';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let campusModules = [];
    let currentModuleIndex = 0;
    let currentTab = 'theory';

    async function init() {
      try {
        const { data, error } = await sb.from('campus_modules').select('*').order('order_index', { ascending: true });
        if (error || !data || data.length === 0) {
           campusModules = CAMPUS_DATA.modules;
        } else {
           campusModules = data;
        }
      } catch (err) {
        campusModules = CAMPUS_DATA.modules;
      }
      renderNav();
      loadModule(0);
    }

    function renderNav() {
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = campusModules.map((mod, idx) => `
        <div class="nav-item ${idx === currentModuleIndex ? 'active' : ''}" onclick="loadModule(${idx})">
          <span class="nav-icon">${mod.icon}</span>
          <span class="nav-label">${mod.title}</span>
        </div>
      `).join('');
    }

    function loadModule(idx) {
      currentModuleIndex = idx;
      const mod = campusModules[idx];
      document.getElementById('currentModTag').innerText = `Módulo 0${idx + 1}`;
      document.getElementById('currentModTitle').innerText = mod.title;
      renderNav();
      renderTab();
    }

    function switchMainView(viewId) {
      document.querySelectorAll('.main-view').forEach(v => v.style.display = 'none');
      document.getElementById(`view-${viewId}`).style.display = 'block';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.getElementById(`btn-${viewId}`).classList.add('active');
      document.getElementById('moduleNavContainer').style.display = viewId === 'campus' ? 'block' : 'none';
    }

    function setTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      if (btn) btn.classList.add('active');
      renderTab();
    }

    function renderTab() {
      const container = document.getElementById('moduleView');
      const mod = campusModules[currentModuleIndex];

      if (currentTab === 'theory') {
        if (mod.pdf_url) {
          container.innerHTML = `<iframe src="${mod.pdf_url}" width="100%" height="800px" style="border: none; border-radius: 8px;"></iframe>`;
        } else {
          container.innerHTML = `
            <p style="color: var(--muted); margin-bottom: 30px;">${mod.intro || mod.theory.intro}</p>
            ${(mod.sections || mod.theory.sections).map(sec => `
              <div class="theory-card">
                <h3>${sec.title}</h3>
                <p style="margin-top: 15px;">${sec.content}</p>
                ${sec.proTip ? `<div class="pro-tip"><strong>PRO TIP</strong>${sec.proTip}</div>` : ''}
              </div>
            `).join('')}`;
        }
      } else if (currentTab === 'practice') {
        renderPractice(container, mod);
      } else {
        CampusQuiz.init(container, mod.exercises);
      }
    }

    function renderPractice(container, mod) {
      if (mod.practice && mod.practice.type === 'calculator') {
        container.innerHTML = `
          <div class="practice-grid">
            <div class="calc-card">
              <div class="input-group"><label>Costos Fijos ($)</label><input type="number" id="in_cf" value="${mod.practice.defaultValues.cf}" oninput="updateCalc()"></div>
              <div class="input-group"><label>Precio Venta ($)</label><input type="number" id="in_pv" value="${mod.practice.defaultValues.pv}" oninput="updateCalc()"></div>
              <div class="input-group"><label>Costo Var. Unit ($)</label><input type="number" id="in_cvu" value="${mod.practice.defaultValues.cvu}" oninput="updateCalc()"></div>
            </div>
            <div>
              <div class="res-card"><div class="tag">CM</div><div class="title" id="res_cm" style="font-size: 24px;">$0</div></div>
              <div class="res-card" style="background: rgba(123,198,122,0.1);"><div class="tag" style="color:var(--green)">PE</div><div class="title" id="res_pe" style="font-size: 24px;">0 u.</div></div>
              <div class="calc-card" style="height: 250px;"><canvas id="peChart"></canvas></div>
            </div>
          </div>`;
        setTimeout(updateCalc, 100);
      } else {
        container.innerHTML = `<div class="theory-card"><h3>Práctica de ${mod.title}</h3><p>Realiza los ejercicios en la pestaña siguiente.</p></div>`;
      }
    }

    let peChart = null;
    function updateCalc() {
      const cf = parseFloat(document.getElementById('in_cf').value) || 0;
      const pv = parseFloat(document.getElementById('in_pv').value) || 0;
      const cvu = parseFloat(document.getElementById('in_cvu').value) || 0;
      const cm = pv - cvu;
      const pe = cm > 0 ? Math.ceil(cf / cm) : 0;
      document.getElementById('res_cm').innerText = `$${cm.toLocaleString()}`;
      document.getElementById('res_pe').innerText = `${pe.toLocaleString()} u.`;
      renderChart(cf, pv, cvu, pe);
    }

    function renderChart(cf, pv, cvu, pe) {
      const ctx = document.getElementById('peChart').getContext('2d');
      const maxQ = pe > 0 ? pe * 2 : 100;
      const labels = [0, Math.floor(maxQ/2), maxQ];
      if (peChart) peChart.destroy();
      peChart = new Chart(ctx, {
        type: 'line',
        data: { labels: labels, datasets: [
          { label: 'Ingresos', data: labels.map(q => q * pv), borderColor: '#d4a853', borderWidth: 2, pointRadius: 0 },
          { label: 'Costos', data: labels.map(q => cf + (q * cvu)), borderColor: '#e05a5a', borderWidth: 2, pointRadius: 0 }
        ]},
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { grid: { color: '#2a3023' } }, y: { grid: { color: '#2a3023' } } } }
      });
    }
  </script>
</body>
</html>
