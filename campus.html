<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Educativo · Costos & Presupuestos</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Fraunces:ital,wght@0,300;0,600;0,700;1,300&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="theory_data.js"></script>
  <script src="questions_data.js"></script>
  <script src="campus_quiz.js"></script>
  <style>
    :root {
      --bg: #0d0f0c;
      --surface: #13160f;
      --card: #181c14;
      --card2: #1c2018;
      --border: #2a3023;
      --gold: #d4a853;
      --gold-low: rgba(212, 168, 83, 0.1);
      --green: #7bc67a;
      --red: #e05a5a;
      --blue: #6ab4d4;
      --text: #e8ead4;
      --muted: #7a8470;
      --mono: 'IBM Plex Mono', monospace;
      --body: 'DM Sans', sans-serif;
      --display: 'Fraunces', serif;
      --sidebar-w: 280px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* --- SIDEBAR --- */
    aside {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .brand {
      padding: 32px 24px;
      border-bottom: 1px solid var(--border);
    }
    .brand h1 {
      font-family: var(--display);
      font-size: 20px;
      color: var(--gold);
    }
    .brand p {
      font-size: 10px;
      font-family: var(--mono);
      letter-spacing: 2px;
      color: var(--muted);
      margin-top: 4px;
    }

    .nav-links {
      flex: 1;
      padding: 24px 16px;
      overflow-y: auto;
    }
    .nav-item {
      display: flex;
      align-items: center;
      padding: 12px 16px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .nav-item:hover {
      background: var(--card);
      color: var(--text);
    }
    .nav-item.active {
      background: var(--gold-low);
      color: var(--gold);
      border: 1px solid rgba(212, 168, 83, 0.2);
    }
    .nav-icon { margin-right: 12px; font-size: 18px; }

    /* --- MAIN CONTENT --- */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 40px;
      position: relative;
    }

    .content-header {
      margin-bottom: 48px;
    }
    .mod-tag {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .mod-title {
      font-family: var(--display);
      font-size: 42px;
      font-weight: 600;
    }

    /* --- TABS --- */
    .tabs-nav {
      display: flex;
      gap: 32px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }
    .tab-btn {
      padding: 12px 0;
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
    }
    .tab-btn.active {
      color: var(--gold);
    }
    .tab-btn.active::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--gold);
    }

    /* --- MODULE VIEWS --- */
    .view-container { animation: fadeIn 0.4s ease forwards; }

    /* Theory View */
    .theory-wrap { max-width: 800px; line-height: 1.7; }
    .theory-section { margin-bottom: 40px; }
    .theory-section h3 { font-family: var(--display); font-size: 24px; margin-bottom: 16px; color: var(--gold); }
    .pro-tip {
      background: var(--card2);
      border-left: 3px solid var(--gold);
      padding: 24px;
      border-radius: 4px;
      margin-top: 24px;
      font-size: 14px;
    }
    .pro-tip strong { color: var(--gold); font-family: var(--mono); font-size: 11px; display: block; margin-bottom: 8px; }

    /* Practice View */
    .practice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    .calc-card { background: var(--card); border: 1px solid var(--border); padding: 32px; border-radius: 12px; }
    .input-group { margin-bottom: 24px; }
    .input-group label { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-bottom: 8px; }
    .input-group input { 
      width: 100%; background: var(--surface); border: 1px solid var(--border); 
      color: var(--text); padding: 12px; border-radius: 4px; font-family: var(--mono);
      outline: none; transition: border-color 0.2s;
    }
    .input-group input:focus { border-color: var(--gold); }
    
    .res-card { background: var(--gold-low); border: 1px solid rgba(212,168,83,0.2); padding: 24px; border-radius: 8px; }
    .res-label { font-size: 11px; font-family: var(--mono); color: var(--gold); margin-bottom: 4px; }
    .res-value { font-size: 32px; font-family: var(--display); font-weight: 700; color: var(--text); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 900px) {
      aside { position: fixed; left: -280px; }
      main { padding: 24px; }
      .practice-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <aside id="sidebar">
    <div class="brand">
      <h1>Campus Culinario</h1>
      <p>COSTOS & GESTIÓN</p>
    </div>
    <nav class="nav-links" id="moduleNav"></nav>
  </aside>

  <main>
    <div id="content">
      <div class="content-header">
        <div class="mod-tag" id="currentModTag">Módulo 01</div>
        <h1 class="mod-title" id="currentModTitle">Cargando...</h1>
      </div>

      <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('theory', this)">Teoría</button>
        <button class="tab-btn" onclick="switchTab('practice', this)">Práctica</button>
        <button class="tab-btn" onclick="switchTab('exercises', this)">Ejercicios</button>
      </nav>

      <div id="moduleView" class="view-container"></div>
    </div>
  </main>

  <script>
    let currentModuleIndex = 0;
    let currentTab = 'theory';

    function init() {
      renderNav();
      loadModule(0);
    }

    function renderNav() {
      const nav = document.getElementById('moduleNav');
      nav.innerHTML = CAMPUS_DATA.modules.map((mod, idx) => `
        <div class="nav-item ${idx === currentModuleIndex ? 'active' : ''}" onclick="loadModule(${idx})">
          <span class="nav-icon">${mod.icon}</span>
          <span class="nav-label">${mod.title}</span>
        </div>
      `).join('');
    }

    function loadModule(idx) {
      currentModuleIndex = idx;
      const mod = CAMPUS_DATA.modules[idx];
      document.getElementById('currentModTag').innerText = `Módulo 0${idx + 1}`;
      document.getElementById('currentModTitle').innerText = mod.title;
      renderNav();
      renderTab();
    }

    function switchTab(tab, btn) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab();
    }

    function renderTab() {
      const container = document.getElementById('moduleView');
      const mod = CAMPUS_DATA.modules[currentModuleIndex];

      if (currentTab === 'theory') {
        container.innerHTML = `
          <div class="theory-wrap">
            <p style="font-size: 18px; margin-bottom: 40px; color: var(--muted)">${mod.theory.intro}</p>
            ${mod.theory.sections.map(sec => `
              <div class="theory-section">
                <h3>${sec.title}</h3>
                <div class="theory-text">${sec.content}</div>
                ${sec.proTip ? `<div class="pro-tip"><strong>PRO TIP</strong>${sec.proTip}</div>` : ''}
              </div>
            `).join('')}
          </div>
        `;
      } else if (currentTab === 'practice') {
        renderPractice(container, mod);
      } else {
        CampusQuiz.init(container, mod.exercises);
      }
    }

    function renderPractice(container, mod) {
      if (mod.practice.type === 'calculator') {
        container.innerHTML = `
          <div class="practice-grid">
            <div class="calc-card">
              <h3 style="margin-bottom: 24px; font-family: var(--display)">Simulador de PE</h3>
              <div class="input-group">
                <label>Costos Fijos Totales ($)</label>
                <input type="number" id="in_cf" value="${mod.practice.defaultValues.cf}" oninput="updateCalc()">
              </div>
              <div class="input-group">
                <label>Precio de Venta ($)</label>
                <input type="number" id="in_pv" value="${mod.practice.defaultValues.pv}" oninput="updateCalc()">
              </div>
              <div class="input-group">
                <label>Costo Variable Unitario ($)</label>
                <input type="number" id="in_cvu" value="${mod.practice.defaultValues.cvu}" oninput="updateCalc()">
              </div>
            </div>
            <div style="display: flex; flex-direction: column; gap: 20px;">
               <div class="res-card">
                  <div class="res-label">Contribución Marginal</div>
                  <div class="res-value" id="res_cm">$0</div>
               </div>
               <div class="res-card" style="background: rgba(123, 198, 122, 0.1); border-color: rgba(123, 198, 122, 0.2);">
                  <div class="res-label" style="color: var(--green)">Punto de Equilibrio</div>
                  <div class="res-value" id="res_pe">0 unidades</div>
               </div>
               <div class="calc-card" style="flex: 1; padding: 20px;">
                  <canvas id="peChart"></canvas>
               </div>
            </div>
          </div>
        `;
        setTimeout(updateCalc, 100);
      } else {
        container.innerHTML = `<h3>${mod.practice.title}</h3><p>${mod.practice.description}</p>`;
      }
    }

    let peChart = null;
    function updateCalc() {
      const cf = parseFloat(document.getElementById('in_cf').value) || 0;
      const pv = parseFloat(document.getElementById('in_pv').value) || 0;
      const cvu = parseFloat(document.getElementById('in_cvu').value) || 0;

      const cm = pv - cvu;
      const pe = cm > 0 ? Math.ceil(cf / cm) : 0;

      document.getElementById('res_cm').innerText = `$${cm.toLocaleString()}`;
      document.getElementById('res_pe').innerText = `${pe.toLocaleString()} unidades`;

      renderChart(cf, pv, cvu, pe);
    }

    function renderChart(cf, pv, cvu, pe) {
      const ctx = document.getElementById('peChart').getContext('2d');
      const maxQ = pe > 0 ? pe * 2 : 100;
      const labels = [0, Math.floor(maxQ/2), maxQ];
      
      const dataIngresos = labels.map(q => q * pv);
      const dataCostos = labels.map(q => cf + (q * cvu));

      if (peChart) peChart.destroy();
      peChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            { label: 'Ingresos', data: dataIngresos, borderColor: '#d4a853', borderWidth: 2, tension: 0.1, pointRadius: 0 },
            { label: 'Costos Totales', data: dataCostos, borderColor: '#e05a5a', borderWidth: 2, tension: 0.1, pointRadius: 0 }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { grid: { color: '#2a3023' }, ticks: { color: '#7a8470', font: { family: 'IBM Plex Mono', size: 9 } } },
            y: { grid: { color: '#2a3023' }, ticks: { color: '#7a8470', font: { family: 'IBM Plex Mono', size: 9 } } }
          }
        }
      });
    }

    init();
  </script>
</body>
</html>
