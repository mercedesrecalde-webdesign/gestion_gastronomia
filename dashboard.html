<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard de Métricas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { background: #0d0f0c; color: #e8ead4; font-family: 'DM Sans', sans-serif; padding: 40px; margin: 0; }
    .container { max-width: 1000px; margin: 0 auto; }
    .card { background: #13160f; border: 1px solid #2a3023; padding: 24px; border-radius: 8px; margin-bottom: 24px; }
    h1 { color: #d4a853; text-align: center; margin-bottom: 40px; font-weight: 600; font-size: 32px; }
    h3 { margin-top: 0; color: #e8ead4; font-weight: 500; font-size: 18px; margin-bottom: 16px; border-bottom: 1px solid #2a3023; padding-bottom: 12px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { padding: 12px 16px; border-bottom: 1px solid #2a3023; text-align: left; }
    th { color: #d4a853; font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }
    td { color: #7a8470; }
    .btn { background: #d4a853; color: #111; padding: 12px 24px; border: none; cursor: pointer; border-radius: 4px; font-weight: 600; font-family: 'DM Sans'; font-size: 15px; width: 100%; margin-top: 20px; }
    .btn:hover { background: #f0c96a; }
    #login { text-align: center; max-width: 400px; margin: 100px auto; }
    .input-group { margin-bottom: 16px; text-align: left; }
    .input-group label { display: block; margin-bottom: 6px; font-size: 12px; color: #7a8470; }
    .input-group input { width: 100%; padding: 12px; border-radius: 4px; border: 1px solid #2a3023; background: #181c14; color: white; outline: none; font-family: monospace; box-sizing: border-box;}
    .input-group input:focus { border-color: #d4a853; }
    .chart-container { position: relative; height: 300px; width: 100%; display: flex; justify-content: center; }
    .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    .header-row h1 { margin-bottom: 0; }
    .btn-print { background: transparent; border: 1px solid #d4a853; color: #d4a853; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; font-family: 'DM Sans'; }
    .btn-print:hover { background: rgba(212,168,83,0.1); }
    .tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab { background: #13160f; border: 1px solid #2a3023; color: #7a8470; padding: 10px 16px; border-radius: 4px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; transition: 0.2s; }
    .tab:hover { background: #181c14; color: #e8ead4; }
    .tab.active { background: rgba(212,168,83,0.1); border-color: #d4a853; color: #d4a853; font-weight: 600; }
    @media print {
      .btn-print { display: none !important; }
      .tabs { display: none !important; }
      body { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
      .card { break-inside: avoid; }
    }
  
    /* Modal and Pills */
    .q-pill { display: inline-block; background: rgba(224,90,90,0.15); color: #e05a5a; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-family: monospace; cursor: pointer; border: 1px solid rgba(224,90,90,0.3); transition: 0.2s; margin: 2px; }
    .q-pill:hover { background: rgba(224,90,90,0.25); border-color: #e05a5a; transform: translateY(-1px); }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
    .modal-overlay.active { display: flex; animation: fadeIn 0.2s ease-out; }
    .q-modal { background: #13160f; border: 1px solid #2a3023; border-radius: 8px; width: 90%; max-width: 600px; padding: 30px; position: relative; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .modal-close { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #7a8470; cursor: pointer; font-size: 24px; line-height: 1; }
    .modal-close:hover { color: #e8ead4; }
    .qm-header { font-family: monospace; font-size: 12px; color: #d4a853; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .qm-badge { background: rgba(212,168,83,0.15); border: 1px solid rgba(212,168,83,0.3); padding: 2px 8px; border-radius: 4px; }
    .qm-text { font-size: 16px; font-weight: 500; color: #e8ead4; line-height: 1.5; margin-bottom: 24px; }
    .qm-correct { background: rgba(107,191,106,0.1); border-left: 3px solid #6bbf6a; padding: 16px; border-radius: 4px; margin-bottom: 16px; }
    .qm-correct-lbl { font-size: 10px; color: #6bbf6a; font-family: monospace; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .qm-correct-val { color: #e8ead4; font-size: 14px; font-weight: 600; }
    .qm-student { background: rgba(224,90,90,0.1); border-left: 3px solid #e05a5a; padding: 16px; border-radius: 4px; margin-bottom: 24px; }
    .qm-student-lbl { font-size: 10px; color: #e05a5a; font-family: monospace; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px; }
    .qm-student-val { color: #e8ead4; font-size: 14px; font-weight: 600; }
    .qm-feedback { background: #181c14; border: 1px solid #2a3023; padding: 16px; border-radius: 4px; color: #7a8470; font-size: 14px; line-height: 1.6; }
    .qm-feedback strong { color: #d4a853; font-weight: normal; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
<body>
  <div class="container">
    <div id="login" class="card" style="display:none;"></div>

    <div id="dashboard" style="display:none;">
      <div class="header-row">
        <h1>Métricas de Evaluación</h1>
        <button class="btn-print" onclick="window.print()">🖨 Guardar como PDF</button>
      </div>
      <div class="tabs" id="filterTabs">
        <button class="tab active" onclick="setFilter('ALL')">Todas las Evaluaciones</button>
        <button class="tab" onclick="setFilter('SIMULACRO')">Simulacro General</button>
        <button class="tab" onclick="setFilter('CM_PE')">Receta Rentabilidad (CM y PE)</button>
        <button class="tab" onclick="setFilter('TP')">TP Gráficos PE</button>
        <button class="tab" onclick="setFilter('SIMULACRO1')">Simulacro 1 (Don Burger)</button>
        <button class="tab" onclick="setFilter('SIMULACRO2')">Simulacro 2 (El Mentidero)</button>
      </div>
      <div class="grid">
        <div class="card">
          <h3>Distribución de Aprobados</h3>
          <div class="chart-container">
            <canvas id="chartPie"></canvas>
          </div>
        </div>
        <div class="card">
          <h3>Calificaciones Generales</h3>
          <div class="chart-container">
            <canvas id="chartBar"></canvas>
          </div>
        </div>
      </div>
      <div class="card">
        <h3>Detalle por Alumno</h3>
        <table>
          <thead><tr><th>Alumno</th><th>Puntaje</th><th>Porcentaje</th><th>Preguntas Falladas</th><th>Fecha</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>

    const QUESTION_DB = {
  "SIMULACRO": {
    "P01": {
      "id": "P01",
      "text": "El alquiler del salón de un restaurante es $1.250.000 por mes, lo pago aunque tenga clientes o no. ¿Cómo se clasifica según su variabilidad?",
      "hint": "",
      "correct": "B) Costo Fijo, porque permanece constante independientemente del nivel de actividad.",
      "feedback": "Exacto. El alquiler es el ejemplo más clásico de Costo Fijo: la empresa debe pagarlo atienda 10 o 200 cubiertos. No depende del volumen de ventas."
    },
    "P02": {
      "id": "P02",
      "text": "Los insumos de cocina (ingredientes) cuestan $1.465.000 por día según el nivel de producción. ¿Cuál es su clasificación por variabilidad?",
      "hint": "",
      "correct": "B) Costo Variable, porque fluctúan en proporción directa a la cantidad de producción.",
      "feedback": "Correcto. Los insumos son el ejemplo más claro de Costo Variable: a mayor producción, mayor costo total de ingredientes. Si no se produce, este costo es cero."
    },
    "P03": {
      "id": "P03",
      "text": "La factura de gas tiene un cargo fijo mensual obligatorio MÁS un componente que aumenta en temporada alta porque la cocina trabaja más horas. ¿Cómo se clasifica?",
      "hint": "",
      "correct": "C) Costo Mixto o Semifijo, porque tiene una parte fija (obligación contractual) y una parte variable (consumo real).",
      "feedback": "Muy bien. Luz, Gas y Agua son costos Mixtos o Semifijos: tienen un cargo fijo inamovible (la obligación mensual del servicio) más un componente variable que sube con el consumo. Esto los diferencia del internet, que es puramente fijo."
    },
    "P04": {
      "id": "P04",
      "text": "Los honorarios del contador externo del restaurante ($300.000/mes) son:",
      "hint": "",
      "correct": "B) Gasto Administrativo, porque es una erogación destinada a la administración del negocio y no puede asignarse directamente a un plato.",
      "feedback": "Correcto. El honorario del contador es un GASTO Administrativo, no un costo de producción. Regla: no se le puede asignar directamente a ningún plato. El gasto se consume en el período y no se recupera con una venta específica."
    },
    "P05": {
      "id": "P05",
      "text": "La empresa compra una nueva amasadora industrial por $2.000.000 para mejorar la producción de pastas. Esta erogación se clasifica como:",
      "hint": "",
      "correct": "C) Inversión, porque se asigna a un activo que generará beneficios futuros y se recupera mediante amortizaciones mensuales.",
      "feedback": "Exactamente. La compra de equipamiento es una INVERSIÓN. El desembolso se activa como un activo y su costo se recupera gradualmente vía amortización mensual (ej. $2.000.000 ÷ 60 meses = $33.333/mes de amortización)."
    },
    "P06": {
      "id": "P06",
      "text": "El salario de los cocineros que trabajan directamente en la línea de producción se clasifica como Mano de Obra Directa (MOD). Es un costo, no un gasto.",
      "hint": "",
      "correct": "Verdadero",
      "feedback": "Verdadero. La MOD incluye el trabajo humano aplicado exclusivamente a la producción. Los cocineros de la línea son MOD. En cambio, el sueldo de un administrativo sería un Gasto, porque no interviene en la producción del plato."
    },
    "P07": {
      "id": "P07",
      "text": "Las comisiones de aplicaciones de delivery ($200.000/mes promedio) y las comisiones de tarjetas ($226.000/mes promedio) son costos:",
      "hint": "",
      "correct": "B) Variables, porque aumentan en proporción al volumen de ventas realizadas.",
      "feedback": "Correcto. Estas comisiones son Variables y de Comercialización: si no hay ventas, no hay comisión. Cuantas más ventas, mayor el total a pagar. Son proporcionales al nivel de actividad."
    },
    "P08": {
      "id": "P08",
      "text": "Al hacer el inventario semanal, el sistema indica 20 kg de salmón en stock (stock teórico), pero la cámara física tiene solo 15 kg. ¿Cómo se denomina la diferencia de 5 kg?",
      "hint": "",
      "correct": "B) Costo Oculto: surge de la brecha entre el stock teórico y el stock físico real. Erosiona directamente la ganancia.",
      "feedback": "Exacto. El Costo Oculto es la brecha entre lo que debería haber (teórico del sistema) y lo que realmente hay (físico en cámara). Sus causas: mermas no reportadas, mala manipulación, vencimientos por no aplicar PEPS y robos. Se descubre en la auditoría de inventarios."
    },
    "P09": {
      "id": "P09",
      "text": "Si se producen 3 pizzas en el turno, ¿cuál es el Costo Total?",
      "hint": "CT = Costos Fijos Totales + Costos Variables Totales",
      "correct": "620000 $",
      "feedback": "CT = $20.000 (CF) + ($200.000 × 3) = $20.000 + $600.000 = <strong>$620.000</strong>. Los costos fijos no cambian; los variables se multiplican por la cantidad producida."
    },
    "P10": {
      "id": "P10",
      "text": "Si se producen 5 pizzas, ¿cuál es el Costo Fijo Unitario (CFU)?",
      "hint": "CFU = Costos Fijos Totales ÷ Cantidad de Unidades Producidas",
      "correct": "4000 $",
      "feedback": "CFU = $20.000 ÷ 5 = <strong>$4.000 por pizza</strong>. A medida que producís más unidades, el mismo costo fijo se reparte entre más pizzas y por eso el CFU baja."
    },
    "P11": {
      "id": "P11",
      "text": "Si se producen 8 pizzas, ¿cuál es el Costo Variable Unitario (CVU)?",
      "hint": "El CVU es constante. No depende de la cantidad producida.",
      "correct": "200000 $",
      "feedback": "CVU = <strong>$200.000 siempre</strong>, sin importar si producís 1 o 10 pizzas. El costo variable unitario no cambia. Lo que cambia es el Costo Variable TOTAL (CVT = CVU × cantidad)."
    },
    "P12": {
      "id": "P12",
      "text": "A medida que aumenta la cantidad producida, el Costo Fijo Unitario (CFU = CF ÷ Q):",
      "hint": "",
      "correct": "C) Disminuye y tiende a cero, porque un valor fijo se divide entre cada vez más unidades.",
      "feedback": "Correcto. CFU = CF ÷ Q. El numerador (CF) es fijo; el denominador (Q) crece. Resultado: el CFU se achica cada vez más. Ejemplo: CF $20.000 con Q=1 → CFU $20.000; con Q=10 → CFU $2.000; con Q=100 → CFU $200. Tiende a cero pero nunca llega."
    },
    "P13": {
      "id": "P13",
      "text": "Cuando la producción es muy alta, el Costo Total Unitario (CTU = CFU + CVU) tiende a:",
      "hint": "",
      "correct": "C) El Costo Variable Unitario, porque el CFU se diluye hasta casi desaparecer.",
      "feedback": "Exacto. CTU = CFU + CVU. A mayor producción, CFU → 0. Entonces: CTU = (algo → 0) + CVU constante. Por eso el CTU se acerca cada vez más al CVU. Como dice el apunte: 'el costo fijo deja de influir por unidad; el único que realmente queda es el variable'."
    },
    "P14": {
      "id": "P14",
      "text": "¿Cuál es el Costo Variable Unitario (CVu) por porción?",
      "hint": "CVu = suma de todos los costos variables que aplican a UNA unidad",
      "correct": "1000 $",
      "feedback": "CVu = Ingredientes + Envase = $900 + $100 = <strong>$1.000 por porción</strong>. Este es el costo que 'sale' de la cocina con cada plato vendido."
    },
    "P15": {
      "id": "P15",
      "text": "¿Cuál es el Costo Variable Total (CVT) del mes con 800 porciones?",
      "hint": "CVT = CVu × Cantidad de unidades producidas",
      "correct": "800000 $",
      "feedback": "CVT = $1.000 × 800 porciones = <strong>$800.000</strong>. El costo variable total escala en proporción directa con las ventas. Si vendieran 1.600 porciones, el CVT sería $1.600.000."
    },
    "P16": {
      "id": "P16",
      "text": "¿Cuál es el Costo Fijo Total (CFT) del mes?",
      "hint": "CFT = suma de todos los costos que se pagan sin importar la producción",
      "correct": "720000 $",
      "feedback": "CFT = Alquiler + Sueldo cocinero + Internet = $400.000 + $300.000 + $20.000 = <strong>$720.000</strong>. Estos costos se pagan igual si se venden 0 o 800 porciones."
    },
    "P17": {
      "id": "P17",
      "text": "¿Cuál es el Costo Total (CT) del mes?",
      "hint": "CT = CVT + CFT",
      "correct": "1520000 $",
      "feedback": "CT = CVT + CFT = $800.000 + $720.000 = <strong>$1.520.000</strong>. Este es el total de dinero que \"sale\" del negocio en el mes para producir las 800 porciones."
    },
    "P18": {
      "id": "P18",
      "text": "Usando el método del Food Cost al 30%, ¿cuál debe ser el Precio de Venta (PV) por porción? (Solo el costo de ingredientes aplica como base)",
      "hint": "PV = Costo Ingredientes ÷ Food Cost deseado  →  PV = $900 ÷ 0,30",
      "correct": "3000 $",
      "feedback": "PV = $900 ÷ 0,30 = <strong>$3.000 por porción</strong>. Esto garantiza que los ingredientes representen exactamente el 30% del precio final. El 70% restante cubre mano de obra, costos fijos y genera ganancia."
    },
    "P19": {
      "id": "P19",
      "text": "Con ese Precio de Venta, ¿cuál es la Contribución Marginal Unitaria (CMu)?",
      "hint": "CMu = Precio de Venta − Costo Variable Unitario",
      "correct": "2000 $",
      "feedback": "CMu = $3.000 − $1.000 = <strong>$2.000 por porción</strong>. Esta es la cantidad que \"queda limpia\" de cada venta para ir pagando los costos fijos. Cada porción vendida aporta $2.000 a la \"bolsa\" que cubre el alquiler, sueldos y servicios."
    },
    "P20": {
      "id": "P20",
      "text": "¿Cuántas porciones debe vender el restaurante para alcanzar el Punto de Equilibrio (PE)?",
      "hint": "PE (unidades) = Costos Fijos Totales ÷ Contribución Marginal Unitaria",
      "correct": "360 porciones",
      "feedback": "PE = $720.000 ÷ $2.000 = <strong>360 porciones</strong>. Hasta la porción 360, cada venta solo cubre costos. Desde la porción 361 en adelante, el negocio empieza a generar ganancia real."
    },
    "P21": {
      "id": "P21",
      "text": "El restaurante vendió 800 porciones este mes. Su Punto de Equilibrio es 360 porciones. ¿Qué significa esto económicamente?",
      "hint": "",
      "correct": "C) Las primeras 360 porciones cubrieron todos los costos fijos. Las 440 porciones restantes (800 − 360) generaron ganancia pura de $880.000.",
      "feedback": "Exacto. Ganancia = (800 − 360) × CMu = 440 × $2.000 = <strong>$880.000 de ganancia real</strong>. Esta es la lógica del PE: una vez que la CMu acumulada 'completó la pared' de costos fijos, cada venta adicional es rentabilidad pura para el propietario."
    },
    "P22": {
      "id": "P22",
      "text": "Siguiendo con La Pasta del Puerto: Si por un problema el local cierra unos días y solo logra vender 300 porciones en el mes (recordá que su PE es 360 porciones y su CMu es $2.000). ¿Cuál fue el resultado económico?",
      "hint": "",
      "correct": "B) Perdieron dinero. Exactamente $120.000 de pérdida.",
      "feedback": "Exacto. Al faltar 60 porciones para llegar al Punto de Equilibrio (360 − 300 = 60), esas 60 porciones a $2.000 de CMu cada una representan el dinero faltante: $120.000 de pérdida."
    },
    "P23": {
      "id": "P23",
      "text": "Opciones para mejorar: Para AUMENTAR nuestra Contribución Marginal Unitaria, una excelente estrategia sería buscar un proveedor de materia prima más barato sin perder calidad, bajando así el Costo Variable Unitario.",
      "hint": "",
      "correct": "Verdadero",
      "feedback": "Verdadero. Si bajás el Costo Variable Unitario (ingredientes) y mantenés el Precio de Venta, la Contribución Marginal (lo que te queda limpio por plato) crece automáticamente."
    },
    "P24": {
      "id": "P24",
      "text": "Opciones para mejorar: Bajar el sueldo del cocinero o mudarnos a un local con alquiler más barato hace que nuestra Contribución Marginal UNITARIA aumente.",
      "hint": "",
      "correct": "Falso",
      "feedback": "Falso. Bajar alquileres o sueldos achica los COSTOS FIJOS, lo cual baja tu Punto de Equilibrio, pero NO cambia tu Contribución Marginal por plato."
    },
    "P25": {
      "id": "P25",
      "text": "Opciones para mejorar: Aumentar el Precio de Venta del plato al cliente es otra forma directa de mejorar la Contribución Marginal Unitaria.",
      "hint": "",
      "correct": "Verdadero",
      "feedback": "Verdadero. Si el cliente te paga más caro (y tus costos son los mismos), te queda una porción de dinero más grande 'limpia' por cada plato."
    },
    "P26": {
      "id": "P26",
      "text": "Si hoy preparan 10 cafés, ¿cuál es el Costo Variable Total?",
      "hint": "Multiplicá la cantidad por el costo variable de cada café.",
      "correct": "5000 $",
      "feedback": "Correcto. 10 cafés × $500 = <strong>$5.000</strong>."
    },
    "P27": {
      "id": "P27",
      "text": "Si preparan 10 cafés, ¿a cuánto ascienden los Costos Fijos Totales del día?",
      "hint": "Recordá la definición de Costo Fijo.",
      "correct": "50000 $",
      "feedback": "Exacto. Los Costos Fijos Totales son siempre <strong>$50.000</strong>, sin importar si preparan 10 o 100 cafés."
    },
    "P28": {
      "id": "P28",
      "text": "Si en un día excelente preparan 100 cafés, ¿cuál es el Costo Fijo Unitario (CFU)?",
      "hint": "Repartí el costo fijo total entre la cantidad de cafés.",
      "correct": "500 $",
      "feedback": "Muy bien. $50.000 ÷ 100 cafés = <strong>$500</strong>. Al vender más, el peso del costo fijo en cada café es mucho menor."
    },
    "P29": {
      "id": "P29",
      "text": "¿Qué pasaría si la cafetería no abre un día por feriado y vende 0 cafés?",
      "hint": "",
      "correct": "B) El Costo Variable Total es $0, pero igual debe asumir los $50.000 de Costos Fijos.",
      "feedback": "Exactamente. Si la producción es cero, el Costo Variable es $0 (no gastás café ni vasos). Pero los Costos Fijos ($50.000 de alquiler y sueldos) se siguen devengando."
    },
    "P30": {
      "id": "P30",
      "text": "El Costo Variable Unitario ($500 por café) se mantiene constante sin importar cuántos cafés se vendan en el día.",
      "hint": "",
      "correct": "Verdadero",
      "feedback": "Verdadero. El costo por unidad no cambia (cada café siempre gasta $500 en insumos). Lo que aumenta en total es el Costo Variable TOTAL a medida que hacés más cafés."
    },
    "P31": {
      "id": "P31",
      "text": "El <strong>Pan de papa</strong> cuesta $300 por unidad. ¿Cómo se clasifica?",
      "hint": "Guía: Pensá en la palabra 'producción'. Si producís más hamburguesas, consumís más panes.",
      "correct": "B) Costo Variable",
      "feedback": "Correcto. Como depende directamente de la cantidad de hamburguesas producidas, es un Costo Variable."
    },
    "P32": {
      "id": "P32",
      "text": "El <strong>Alquiler del local</strong> sale $400.000 por mes.",
      "hint": "Guía: Pensá en la palabra 'tiempo'. Se paga por mes, sin importar si vendés mucho o poco.",
      "correct": "A) Costo Fijo",
      "feedback": "Exacto. Es un Costo Fijo porque permanece constante frente a los cambios en el nivel de actividad."
    },
    "P33": {
      "id": "P33",

    function showModal(examType, code, userAns) {
      if (!QUESTION_DB[examType] || !QUESTION_DB[examType][code]) {
        document.getElementById('qmText').textContent = "Detalle no disponible para esta pregunta.";
        document.getElementById('qmCorrect').innerHTML = "-";
        document.getElementById('qmFeedback').innerHTML = "No se encontraron metadatos para el código ingresado.";
      } else {
        const q = QUESTION_DB[examType][code];
        document.getElementById('qmText').innerHTML = q.text + (q.hint ? '<br><br><span style="color:#5ab4d4;font-size:13px;font-family:monospace">📐 ' + q.hint + '</span>' : '');
        document.getElementById('qmCorrect').innerHTML = q.correct;
        document.getElementById('qmFeedback').innerHTML = q.feedback;
      }

      const studWrap = document.getElementById('qmStudentWrap');
      if (userAns) {
          studWrap.style.display = 'block';
          document.getElementById('qmStudentAns').textContent = userAns;
      } else {
          studWrap.style.display = 'none';
      }

      document.getElementById('qmCode').textContent = code;
      const exLabels = { 'SIMULACRO': 'SIMULACRO GENERAL', 'CM_PE': 'RECETA RENTABILIDAD (CM Y PE)', 'TP': 'TP GRÁFICOS', 'SIMULACRO1': 'SIMULACRO 1 (DON BURGER)', 'SIMULACRO2': 'SIMULACRO 2 (EL MENTIDERO)' };
      document.getElementById('qmExam').textContent = exLabels[examType] || examType;
      
      document.getElementById('qModalOverlay').classList.add('active');
    }

    function closeModal(e, force) {
      if (force || e.target === document.getElementById('qModalOverlay')) {
        document.getElementById('qModalOverlay').classList.remove('active');
      }
    }

    let allData = [];
    let currentFilter = 'ALL';
    let chartPieInstance = null;
    let chartBarInstance = null;

    function getExamType(r) {
      if (r.errores) {
        if (r.errores.startsWith('TP GRÁFICOS')) return 'TP';
        if (r.errores.startsWith('S1:')) return 'SIMULACRO1';
        if (r.errores.startsWith('S2:')) return 'SIMULACRO2';
      }
      if (r.total === 13) return 'TP';
      if (r.total === 21) return 'CM_PE';
      if (r.total === 20) return 'SIMULACRO2'; // fallback for backward compatibility
      return 'SIMULACRO';
    }

    function setFilter(filterId) {
      currentFilter = filterId;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelector(`button[onclick="setFilter('${filterId}')"]`).classList.add('active');
      renderDashboard();
    }

    function renderDashboard() {
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';
      
      let aprobados = 0, reprobados = 0;
      const notas = { 'Desaprobado':0, 'Aprobado (6+)':0, 'Muy Bien (8+)':0, 'Excelente (10)':0 };
      
      const filteredData = currentFilter === 'ALL' 
        ? allData 
        : allData.filter(r => getExamType(r) === currentFilter);

      filteredData.forEach(r => {
        if(r.porcentaje >= 60) aprobados++; else reprobados++;
        
        let rank = r.porcentaje>=90 ? 'Excelente (10)' : r.porcentaje>=75 ? 'Muy Bien (8+)' : r.porcentaje>=60 ? 'Aprobado (6+)' : 'Desaprobado';
        notas[rank]++;
        
        const date = new Date(r.created_at).toLocaleDateString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
        
        tbody.innerHTML += `<tr>
          <td style="color:#d4a853; font-weight:500;">${r.nombre}</td>
          <td>${r.puntaje} / ${r.total}</td>
          <td style="color:${r.porcentaje>=60 ? '#7bc67a' : '#e05a5a'}">${r.porcentaje}%</td>
          <td style="font-size:12px; color:#7a8470; line-height:1.4;">
            ${(() => {
              if (!r.errores) return '-';
              let eStr = r.errores.replace('TP GRÁFICOS: ', '').replace('S1: OK', '').replace('S2: OK', '').replace('S1: ', '').replace('S2: ', '');
              let chunks = eStr.split(',').map(s => s.trim()).filter(Boolean);
              let exType = getExamType(r);
              return chunks.map(chunk => {
                let parts = chunk.split('||');
                let code = parts[0].trim();
                let userAns = parts.length > 1 ? parts[1].trim().replace(/'/g, "&#39;") : '';
                return `<span class="q-pill" onclick="showModal('${exType}', '${code}', '${userAns}')">${code}</span>`;
              }).join('');
            })()}
          </td>
          <td style="font-size:12px; color:#7a8470;">${date}</td>
        </tr>`;
      });

      if (chartPieInstance) chartPieInstance.destroy();
      if (chartBarInstance) chartBarInstance.destroy();

      Chart.defaults.color = '#7a8470';
      Chart.defaults.font.family = "'DM Sans', sans-serif";

      chartPieInstance = new Chart(document.getElementById('chartPie'), {
        type: 'doughnut',
        data: {
          labels: ['Aprobados (60% o más)', 'Para Repasar (Menos de 60%)'],
          datasets: [{ data: [aprobados, reprobados], backgroundColor: ['#7bc67a', '#e05a5a'], borderWidth: 0, hoverOffset: 4 }]
        },
        options: { 
          maintainAspectRatio: false,
          plugins: { legend: { position: 'bottom', labels: { color: '#e8ead4', padding: 20 } } },
          cutout: '70%'
        }
      });

      chartBarInstance = new Chart(document.getElementById('chartBar'), {
        type: 'bar',
        data: {
          labels: ['Desaprobado', 'Aprobado', 'Muy Bien', 'Excelente'],
          datasets: [{ 
            label: 'Alumnos', 
            data: [notas['Desaprobado'], notas['Aprobado (6+)'], notas['Muy Bien (8+)'], notas['Excelente (10)']], 
            backgroundColor: ['#e05a5a', '#6ab4d4', '#7bc67a', '#d4a853'],
            borderRadius: 4
          }]
        },
        options: { 
          maintainAspectRatio: false,
          scales: { 
            y: { ticks: { color: '#7a8470', stepSize: 1 }, grid: { color: '#2a3023' } }, 
            x: { ticks: { color: '#e8ead4' }, grid: { display: false } } 
          }, 
          plugins: { legend: { display: false } } 
        }
      });
    }
